<!DOCTYPE html>
<html lang="ja">
  <head>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      .tester-title{font-size:15px;font-weight:600;margin:6px 0 0}

              <article class="file-row">
                <div class="file-main">
                  <span class="file-icon">IPA</span>
                  <span class="file-name">Agar.io</span>

                <span class="file-meta">59.71 MB</span>
                <span class="file-meta">2025-09-15</span>
                <div class="file-actions">
                  <a
                    class="download-button"
                    href="https://www.mediafire.com/file/idt2r1196l25t42/file"

                  </a>
                </div>
              </article>

              <article class="file-row">
                <div class="file-main">
                  <span class="file-icon">IPA</span>
                  <span class="file-name">コインスキン</span>
                </div>
                <span class="file-meta">56.08 MB</span>
                <span class="file-meta">2025-09-15</span>

                    ダウンロード

                <div class="file-main">
                  <span class="file-icon">IPA</span>

                </div>
                <span class="file-meta">-</span>
                <span class="file-meta">-</span>
                <div class="file-actions">
                  <a
                    class="download-button"
                    href="#"
                    onclick="pwdl(event,'https://www.mediafire.com/file/in0j260z0w2nvvv/file')"
                  >
                    ダウンロード
                  </a>
                </div>
              </article>
            </section>
          </div>
        </div>
      </section>
    </main>

    <script>
      function pwdl(e,u){
        e.preventDefault();
        var p=prompt("パスワードを入力");
        if(p==="2842"){location.href=u;}
      }
    </script>
